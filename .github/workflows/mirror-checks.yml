name: mirror-checks

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend deps
        run: pip install -r app/backend/requirements.txt
      - name: Ruff
        run: ruff check app/backend/src app/backend/tests
      - name: Pytest
        run: PYTHONPATH=app/backend pytest -q app/backend/tests

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Frontend tests
        run: cd app/frontend && npm ci && npm test
